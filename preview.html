<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>动画预览</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0f0f1a;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            font-family: system-ui;
        }
        .preview-header {
            background: rgba(30,30,46,0.9);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            display: flex;
            justify-content: flex-end;
            border-bottom: 1px solid #2d2d44;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .back-btn {
            background: #ff4757;
            border: none;
            color: white;
            font-weight: bold;
            padding: 6px 20px;
            border-radius: 40px;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            transition: 0.2s;
        }
        .back-btn:hover {
            background: #e84118;
            transform: scale(0.96);
        }
        .iframe-container {
            flex: 1;
            background: #fff;
            position: relative;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            color: #aaa;
        }
    </style>
    <script src="https://res.wx.qq.com/open/js/jweixin-1.6.0.js"></script>
</head>
<body>
<div class="preview-header">
    <button class="back-btn" id="backBtn">← 返回</button>
</div>
<div class="iframe-container">
    <iframe id="previewFrame" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals"></iframe>
    <div class="loading" id="loadingTip">🎨 加载动画中...</div>
</div>
<script>
    const frame = document.getElementById('previewFrame');
    const loadingTip = document.getElementById('loadingTip');
    
    // 渲染用户代码到 iframe
    function renderCode(code) {
        if (!code || code.trim() === '') {
            code = `<html><body style="background:#eee; display:flex; justify-content:center; align-items:center;"><h3>✨ 暂无代码，请在编辑器编写动画✨</h3></body></html>`;
        }
        // 安全渲染：使用 srcdoc
        frame.srcdoc = code;
        loadingTip.style.display = 'none';
        frame.onload = () => {
            loadingTip.style.display = 'none';
        };
    }
    
    // 从 localStorage 获取代码并渲染
    function fetchCodeAndRender() {
        loadingTip.style.display = 'flex';
        
        // 从 localStorage 获取代码（同域名下 editor.html 保存的）
        const code = localStorage.getItem('user_code');
        if (code && code.trim() !== '') {
            renderCode(code);
        } else {
            renderCode(`<html><body style="background:#111; color:white; display:flex; justify-content:center; align-items:center; height:100vh;"><div>✨ 点击「运行」开始动画 ✨</div></body></html>`);
        }
    }
    
    // 监听返回按钮：调用 navigateBack 返回编辑页
    let isNavigating = false;  // 防止重复点击
    document.getElementById('backBtn').addEventListener('click', () => {
        if (isNavigating) return;  // 已在跳转中，忽略
        isNavigating = true;
        
        if (typeof wx !== 'undefined' && wx.miniProgram) {
            // 直接返回上一页
            wx.miniProgram.navigateBack({
                delta: 1,
                fail: function() {
                    isNavigating = false;
                }
            });
        } else {
            isNavigating = false;
            alert("返回编辑器");
        }
    });
    
    // 页面加载时渲染
    fetchCodeAndRender();
    
    // 监听 storage 变化（当小程序切换时有可能再次进入，刷新时重新拉取）
    window.addEventListener('focus', () => {
        fetchCodeAndRender();
    });
</script>
</body>
</html>
