<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>动画预览</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #0f0f1a;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            font-family: system-ui;
        }
        .preview-header {
            background: rgba(30,30,46,0.9);
            backdrop-filter: blur(10px);
            padding: 12px 20px;
            display: flex;
            justify-content: flex-end;
            border-bottom: 1px solid #2d2d44;
            position: sticky;
            top: 0;
            z-index: 10;
        }
        .back-btn {
            background: #ff4757;
            border: none;
            color: white;
            font-weight: bold;
            padding: 6px 20px;
            border-radius: 40px;
            font-size: 14px;
            cursor: pointer;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
            transition: 0.2s;
        }
        .back-btn:hover {
            background: #e84118;
            transform: scale(0.96);
        }
        .iframe-container {
            flex: 1;
            background: #fff;
            position: relative;
        }
        iframe {
            width: 100%;
            height: 100%;
            border: none;
            background: white;
        }
        .loading {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%,-50%);
            color: #aaa;
        }
    </style>
    <script src="https://res.wx.qq.com/open/js/jweixin-1.6.0.js"></script>
</head>
<body>
<div class="preview-header">
    <button class="back-btn" id="backBtn">← 返回</button>
</div>
<div class="iframe-container">
    <iframe id="previewFrame" sandbox="allow-same-origin allow-scripts allow-popups allow-forms allow-modals"></iframe>
    <div class="loading" id="loadingTip">🎨 加载动画中...</div>
</div>
<script>
    const frame = document.getElementById('previewFrame');
    const loadingTip = document.getElementById('loadingTip');
    
    // 渲染用户代码到 iframe
    function renderCode(code) {
        if (!code || code.trim() === '') {
            code = `<html><body style="background:#eee; display:flex; justify-content:center; align-items:center;"><h3>✨ 暂无代码，请在编辑器编写动画✨</h3></body></html>`;
        }
        // 安全渲染：使用 srcdoc
        frame.srcdoc = code;
        loadingTip.style.display = 'none';
        frame.onload = () => {
            loadingTip.style.display = 'none';
        };
    }
    
    // 从小程序获取最新代码
    function fetchCodeAndRender() {
        loadingTip.style.display = 'flex';
        if (typeof wx !== 'undefined' && wx.miniProgram) {
            wx.miniProgram.getStorage({
                key: 'user_code',
                success: (res) => {
                    if (res.data) {
                        renderCode(res.data);
                    } else {
                        // 降级默认演示
                        renderCode(`<html><body style="background:#111; color:white; display:flex; justify-content:center; align-items:center; height:100vh;"><div>✨ 点击「运行」开始动画 ✨</div></body></html>`);
                    }
                },
                fail: () => {
                    renderCode(`<html><body>无法获取代码，请返回编辑页重新运行</body></html>`);
                }
            });
        } else {
            // 模拟演示环境
            renderCode(`<html><body style="background:#222; color:white; display:flex; justify-content:center; align-items:center; height:100vh;">请在微信小程序中打开预览</body></html>`);
        }
    }
    
    // 监听返回按钮：调用 navigateBack 返回编辑页
    document.getElementById('backBtn').addEventListener('click', () => {
        if (typeof wx !== 'undefined' && wx.miniProgram) {
            wx.miniProgram.postMessage({ data: { type: 'back' } });
            // 返回上一页（编辑器页）
            wx.miniProgram.navigateBack();
        } else {
            console.log("返回编辑器");
            alert("返回编辑器");
        }
    });
    
    // 页面加载时渲染
    fetchCodeAndRender();
    
    // 监听 storage 变化（当小程序切换时有可能再次进入，刷新时重新拉取）
    window.addEventListener('focus', () => {
        fetchCodeAndRender();
    });
</script>
</body>
</html>
